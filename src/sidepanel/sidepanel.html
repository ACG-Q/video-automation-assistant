<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg: #12121a;
      --surface: #1a1a2e;
      --surface-hover: #22223a;
      --surface-active: #2a2a44;
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.12);
      --primary: #6c5ce7;
      --primary-hover: #7c6ff0;
      --primary-active: #8c7ff5;
      --text: #e8e8ee;
      --text-secondary: #9a9aaf;
      --text-muted: #6a6a7a;
      --success: #4caf50;
      --warning: #ff9800;
      --danger: #f44336;
      --radius-sm: 6px;
      --radius: 10px;
      --radius-lg: 14px;
      --shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      overflow-x: hidden;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .header-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .header-version {
      font-size: 10px;
      color: var(--text-muted);
      margin-left: 6px;
      font-weight: 400;
    }
    .header-update {
      font-size: 10px;
      color: var(--warning);
      margin-left: 6px;
      cursor: pointer;
      text-decoration: underline;
    }
    .icon-btn {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 50%;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .icon-btn:hover { background: var(--surface-hover); color: var(--text); }
    .icon-btn svg { width: 18px; height: 18px; }

    .tabs {
      display: flex;
      gap: 2px;
      padding: 8px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .tab {
      flex: 1;
      padding: 7px 12px;
      text-align: center;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      background: transparent;
      border: none;
      transition: background 0.2s, color 0.2s;
    }
    .tab:hover { color: var(--text); background: var(--surface-hover); }
    .tab.active { color: #fff; background: var(--primary); }

    .content { padding: 12px; }
    .section-label {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }
    .section-label svg { width: 14px; height: 14px; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border: none;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      background: var(--primary);
      color: #fff;
      transition: background 0.2s, transform 0.15s;
      min-height: 36px;
    }
    .btn:hover { background: var(--primary-hover); }
    .btn:active { transform: scale(0.97); }
    .btn-secondary { background: var(--surface-hover); color: var(--text); }
    .btn-secondary:hover { background: var(--surface-active); }
    .btn-danger { background: var(--danger); }
    .btn-danger:hover { background: #e53935; }
    .btn-block { width: 100%; justify-content: center; }
    .btn-sm { padding: 5px 12px; font-size: 12px; min-height: 32px; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn svg { width: 14px; height: 14px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px;
      margin-bottom: 10px;
    }
    .card-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
    .card-desc { font-size: 12px; color: var(--text-secondary); margin-bottom: 10px; }
    .card-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .queue-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 10px;
      border-radius: var(--radius);
      cursor: pointer;
      margin-bottom: 3px;
      font-size: 13px;
      border: 1px solid transparent;
      transition: background 0.2s, border-color 0.2s;
    }
    .queue-item:hover { background: var(--surface-hover); }
    .queue-item.active { background: rgba(108,92,231,0.15); border-color: var(--primary); }
    .queue-item.done { opacity: 0.5; }
    .queue-item .q-status {
      width: 18px; height: 18px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-size: 10px;
    }
    .queue-item .q-status svg { width: 12px; height: 12px; }
    .queue-item .q-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .queue-item.done .q-title { text-decoration: line-through; color: var(--text-muted); }
    .queue-item .q-idx {
      font-size: 11px;
      color: var(--text-muted);
      width: 20px;
      text-align: right;
      flex-shrink: 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }
    .badge-on { background: rgba(76,175,80,0.15); color: var(--success); }
    .badge-off { background: rgba(244,67,54,0.15); color: var(--danger); }

    .control-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
      margin-bottom: 10px;
    }
    .control-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 10px 8px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 11px;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      min-height: 52px;
    }
    .control-btn:hover { background: var(--surface-hover); color: var(--text); border-color: var(--border-hover); }
    .control-btn svg { width: 18px; height: 18px; }
    .control-btn.is-primary { color: var(--primary); }
    .control-btn.is-primary:hover { border-color: var(--primary); background: rgba(108,92,231,0.1); }

    .speed-group {
      display: flex;
      gap: 4px;
      align-items: center;
      flex-wrap: wrap;
    }
    .speed-chip {
      padding: 4px 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
      min-height: 30px;
    }
    .speed-chip:hover { border-color: var(--primary); color: var(--primary); }
    .speed-chip.is-active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .speed-input {
      width: 56px;
      padding: 4px 6px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      font-size: 12px;
      text-align: center;
      min-height: 30px;
      outline: none;
      transition: border-color 0.2s;
    }
    .speed-input:focus { border-color: var(--primary); }

    .match-card {
      background: rgba(108,92,231,0.08);
      border: 1px solid rgba(108,92,231,0.2);
      border-radius: var(--radius);
      padding: 12px;
      margin-top: 8px;
      font-size: 13px;
    }
    .match-card .label { color: var(--text-muted); font-size: 11px; display: block; margin-bottom: 2px; }
    .match-card .match-value { margin-bottom: 8px; word-break: break-all; }
    .match-card .match-divider { height: 1px; background: rgba(108,92,231,0.15); margin: 8px 0; }
    .match-card .match-row { display: flex; gap: 12px; font-size: 12px; }
    .match-card .match-row-item { display: flex; align-items: center; gap: 4px; color: var(--text-secondary); }
    .match-card .match-row-item svg { width: 12px; height: 12px; }
    .match-card .no-match svg { width: 14px; height: 14px; }

    .log-area {
      margin: 0 12px 12px;
      max-height: 120px;
      overflow-y: auto;
      font-size: 11px;
      color: var(--text-secondary);
      background: rgba(0,0,0,0.25);
      border-radius: var(--radius);
      padding: 8px 10px;
      border: 1px solid var(--border);
    }
    .log-entry { display: flex; align-items: flex-start; gap: 6px; padding: 2px 0; line-height: 1.4; }
    .log-dot { width: 5px; height: 5px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
    .log-dot.info { background: var(--text-muted); }
    .log-dot.success { background: var(--success); }
    .log-dot.warn { background: var(--warning); }
    .log-dot.error { background: var(--danger); }

    .progress-bar {
      height: 3px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      overflow: hidden;
      margin: 8px 0;
    }
    .progress-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .user-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .user-info > div { display: flex; align-items: center; gap: 4px; }
    .user-info .ulabel { color: var(--text-muted); min-width: 56px; }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-title">视频自动化助手<span class="header-version" id="versionText"></span></span>
    <button class="icon-btn" id="configBtn" aria-label="设置">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
    </button>
  </div>
  <div class="tabs" id="tabBar" style="display:none;">
    <button class="tab active" data-tab="tasks">任务</button>
    <button class="tab" data-tab="play">播放</button>
  </div>
  <div class="content" id="contentArea"></div>
  <div class="log-area" id="logArea"></div>
  <script src="../../dist/sidepanel.js"></script>
</body>
</html>
