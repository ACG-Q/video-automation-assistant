<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg: #f5f6fa;
      --surface: #ffffff;
      --surface-hover: #f0f1f5;
      --border: #e5e7eb;
      --border-hover: #d1d5db;
      --primary: #4f6af0;
      --primary-hover: #3b55d8;
      --primary-soft: rgba(79,106,240,0.08);
      --text: #1a1d26;
      --text-secondary: #6b7280;
      --text-muted: #9ca3af;
      --success: #10b981;
      --success-soft: #d1fae5;
      --warning: #f59e0b;
      --danger: #ef4444;
      --danger-soft: #fee2e2;
      --radius-sm: 6px;
      --radius: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow: 0 1px 3px rgba(0,0,0,0.09);
      --transition: 150ms ease;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
      overflow-x: hidden;
    }
    :focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header-logo {
      width: 22px;
      height: 22px;
      background: var(--primary);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
    }
    .header-title {
      font-weight: 600;
      font-size: 14px;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 2px;
    }
    .header-version {
      font-size: 10px;
      color: var(--text-muted);
    }
    .header-update {
      font-size: 10px;
      color: var(--warning);
      cursor: pointer;
      text-decoration: underline;
    }
    .icon-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
    }
    .icon-btn:hover { background: var(--surface-hover); color: var(--text); }
    .icon-btn svg { width: 16px; height: 16px; }

    .tabs {
      display: flex;
      gap: 2px;
      padding: 8px 14px 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .tab {
      flex: 1;
      padding: 8px 12px 10px;
      text-align: center;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      transition: color var(--transition), border-color var(--transition);
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); }

    .content { padding: 12px 14px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px;
      margin-bottom: 10px;
      box-shadow: var(--shadow-sm);
    }
    .card-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
    .card-desc { font-size: 12px; color: var(--text-secondary); margin-bottom: 10px; }

    .section-label {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }
    .section-label svg { width: 12px; height: 12px; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 7px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      background: var(--surface);
      color: var(--text);
      transition: background var(--transition), border-color var(--transition);
      min-height: 32px;
      white-space: nowrap;
    }
    .btn:hover { background: var(--surface-hover); }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-primary:active { background: var(--primary-hover); }
    .btn-danger { background: var(--danger); color: #fff; border-color: var(--danger); }
    .btn-danger:hover { background: #e53935; }
    .btn-block { width: 100%; justify-content: center; }
    .btn-sm { padding: 5px 10px; font-size: 11px; min-height: 28px; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn svg { width: 13px; height: 13px; }

    .row { display: flex; gap: 6px; align-items: center; }

    .queue-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: var(--radius);
      cursor: pointer;
      margin-bottom: 2px;
      font-size: 12px;
      border: 1px solid transparent;
      transition: background var(--transition), border-color var(--transition);
    }
    .queue-item:hover { background: var(--surface-hover); }
    .queue-item.active { background: var(--primary-soft); border-color: var(--primary); }
    .queue-item.done { opacity: 0.5; }
    .queue-item .q-badge {
      width: 20px; height: 20px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-size: 10px;
      font-weight: 600;
    }
    .queue-item .q-badge svg { width: 12px; height: 12px; }
    .queue-item .q-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .queue-item.done .q-title { text-decoration: line-through; color: var(--text-muted); }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
    }
    .badge-on { background: var(--success-soft); color: var(--success); }
    .badge-off { background: var(--danger-soft); color: var(--danger); }

    .control-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 6px;
      margin-bottom: 10px;
    }
    .control-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 10px 6px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 10px;
      transition: background var(--transition), color var(--transition), border-color var(--transition);
      min-height: 48px;
    }
    .control-btn:hover { background: var(--surface-hover); color: var(--text); border-color: var(--border-hover); }
    .control-btn svg { width: 16px; height: 16px; }
    .control-btn.is-primary { color: var(--primary); }
    .control-btn.is-primary:hover { border-color: var(--primary); background: var(--primary-soft); }

    .speed-group {
      display: flex;
      gap: 4px;
      align-items: center;
      flex-wrap: wrap;
    }
    .speed-chip {
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 11px;
      transition: all var(--transition);
      min-height: 26px;
    }
    .speed-chip:hover { border-color: var(--primary); color: var(--primary); }
    .speed-chip.is-active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .speed-input {
      width: 52px;
      padding: 3px 6px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 11px;
      text-align: center;
      min-height: 26px;
      outline: none;
      transition: border-color var(--transition);
    }
    .speed-input:focus { border-color: var(--primary); }

    .match-card {
      background: var(--primary-soft);
      border: 1px solid rgba(79,106,240,0.15);
      border-left: 3px solid var(--primary);
      border-radius: var(--radius);
      padding: 12px;
      margin-top: 8px;
      font-size: 12px;
    }
    .match-card .m-label { color: var(--text-muted); font-size: 10px; display: block; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.04em; }
    .match-card .m-value { margin-bottom: 6px; word-break: break-all; }
    .match-card .m-divider { height: 1px; background: rgba(79,106,240,0.12); margin: 8px 0; }
    .match-card .m-row { display: flex; gap: 10px; font-size: 11px; }
    .match-card .m-row-item { display: flex; align-items: center; gap: 3px; color: var(--text-secondary); }
    .match-card .m-row-item svg { width: 11px; height: 11px; }
    .match-card .no-match { color: var(--warning); font-size: 11px; display: flex; align-items: center; gap: 4px; }
    .match-card .no-match svg { width: 12px; height: 12px; }

    .log-area {
      margin: 0 14px 12px;
      max-height: 100px;
      overflow-y: auto;
      font-size: 10px;
      color: var(--text-secondary);
      background: var(--surface);
      border-radius: var(--radius);
      padding: 8px 10px;
      border: 1px solid var(--border);
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    }
    .log-entry { display: flex; align-items: flex-start; gap: 5px; padding: 2px 0; line-height: 1.4; }
    .log-dot { width: 4px; height: 4px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
    .log-dot.info { background: var(--text-muted); }
    .log-dot.success { background: var(--success); }
    .log-dot.warn { background: var(--warning); }
    .log-dot.error { background: var(--danger); }

    .progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 2px;
      transition: width 300ms ease;
    }

    .user-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 10px;
    }
    .user-info > div { display: flex; align-items: center; gap: 4px; }
    .user-info .ulabel { color: var(--text-muted); min-width: 52px; font-size: 10px; }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .guide {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 32px 16px 16px;
    }
    .guide-icon {
      width: 56px;
      height: 56px;
      background: var(--primary-soft);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
    }
    .guide-icon svg { width: 28px; height: 28px; }
    .guide-text {
      color: var(--text-muted);
      font-size: 13px;
      text-align: center;
      max-width: 240px;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-left">
      <div class="header-logo" aria-hidden="true">V</div>
      <span class="header-title">视频助手</span>
      <span class="header-version" id="versionText"></span>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="configBtn" aria-label="设置" title="设置">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.32 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      </button>
      <button class="icon-btn" id="bankBtn" aria-label="题库" title="题库">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
      </button>
    </div>
  </header>

  <nav class="tabs" id="tabBar" role="tablist" aria-label="功能标签">
    <button class="tab active" data-tab="tasks" role="tab" aria-selected="true">任务</button>
    <button class="tab" data-tab="play" role="tab" aria-selected="false">控制</button>
  </nav>

  <main class="content" id="contentArea" role="tabpanel"></main>

  <div class="log-area" id="logArea" role="log" aria-live="polite" aria-label="日志"></div>

  <script src="../../dist/sidepanel.js"></script>
</body>
</html>
