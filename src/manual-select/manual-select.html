<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>手动选择答案</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; padding: 16px; background: #1a1a2e; color: #e0e0e6; font-size: 14px; }
    h3 { margin-bottom: 12px; font-size: 16px; }
    #qTitle { font-size: 13px; color: #9a9aaf; margin-bottom: 12px; line-height: 1.5; }
    .opt { padding: 10px 12px; border-radius: 8px; cursor: pointer; margin-bottom: 6px; border: 1px solid rgba(255,255,255,0.1); transition: all 0.2s; font-size: 14px; }
    .opt:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.2); }
    .opt.selected { background: rgba(108,92,231,0.3); border-color: #6c5ce7; }
    .btn { width: 100%; padding: 12px; border-radius: 20px; border: none; background: #6c5ce7; color: white; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 12px; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn:hover:not(:disabled) { opacity: 0.85; }
  </style>
</head>
<body>
  <h3>手动选择答案</h3>
  <div id="qTitle"></div>
  <div id="optsList"></div>
  <button class="btn" id="confirmBtn" disabled>确认选择</button>
  <script src="../../dist/manual-select.js"></script>
</body>
</html>
