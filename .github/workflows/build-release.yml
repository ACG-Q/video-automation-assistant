name: Build and Release

on:
  push:
    branches: [master]
    tags:
      - 'v*'
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Update manifest.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          node -e "
          const m = require('./manifest.json');
          m.version = process.env.VERSION;
          require('fs').writeFileSync('manifest.json', JSON.stringify(m, null, 2));
          "

      - run: npm run build

      - name: Package extension
        run: |
          ZIP="video-automation-assistant.zip"
          [ -n "$VERSION" ] && ZIP="video-automation-assistant-v${VERSION}.zip"
          cd dist && zip -r "../$ZIP" .
      - uses: actions/upload-artifact@v4
        with:
          name: extension
          path: video-automation-assistant-*.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: extension
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: video-automation-assistant-*.zip
          generate_release_notes: true
